<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Slot Machine</title>
        <meta name="description" content="A Javascript Slot Machine" />
        <meta name="robots" content="noindex, nofollow" />
        <link
            href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700&display=swap"
            rel="stylesheet" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link href="./src/style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="slot-container">
            <div class="slot" id="slot1"><div class="reel"></div></div>
            <div class="slot" id="slot2"><div class="reel"></div></div>
            <div class="slot" id="slot3"><div class="reel"></div></div>
        </div>

        <button id="startBtn">ROLL</button>
        <div id="result"></div>
        <div id="balance">Balance: $50</div>

        <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
        <script src="./src/script.js"></script>
    </body>
</html>
